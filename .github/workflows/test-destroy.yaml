name: Test-Destroy
on:
  workflow_dispatch:

jobs:
  destroy-plan:
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4
      - name: Destroy Plan
        run: make test-destroy-plan TOKEN="${{ secrets.VAULT_TOKEN }}"

  destroy:
    needs: destroy-plan
    runs-on: self-hosted
    environment: test-destroy
    steps:
      - uses: actions/checkout@v4
      - name: Destroy Infra
        run: make test-destroy TOKEN="${{ secrets.VAULT_TOKEN }}"